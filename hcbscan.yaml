openapi: 3.1.0
info:
  title: HCBScan API
  description: >-
    HCBScan is the first public explorer for HCB organizations, users, and
    transactions and it indexes and aggregates data from HCB, providing unique
    insights like user net worth, cross-org activity feeds, leaderboards,
    searching, and more. This is the public API so you can integrate with it.


    ## Rate Limits


    - 60 requests per minute (by IP)

    - Rate limit headers are included on every response: `X-RateLimit-Limit`,
    `X-RateLimit-Remaining`, `X-RateLimit-Reset`


    ## Response Format


    All responses use a consistent envelope:


    ```json

    {
      "ok": true,
      "data": { ... },
      "meta": { "page": 1, "per_page": 50, "total": 1234, "has_more": true }
    }

    ```


    Errors return:


    ```json

    {
      "ok": false,
      "error": { "code": "NOT_FOUND", "message": "Organization not found" }
    }

    ```
  version: 1.0.0
  contact:
    name: HCBScan
    url: https://hcbscan.3kh0.net
    email: hello@3kh0.net
  # license:
  #   name: GPL-3.0
  #   identifier: GPL-3.0-only
  #   url: https://github.com/3kh0/hcbscan/blob/main/LICENSE.txt
servers:
  - url: https://hcbscan.3kh0.net/api/v1
    description: Production
tags:
  - name: Organizations
    description: HCB organizations (fiscal sponsors, clubs, nonprofits)
  - name: Users
    description: HCB users and their profiles
  - name: Activities
    description: Transaction and activity feed
  - name: Search
    description: Full-text search across all entities
  - name: Stats
    description: Aggregate statistics and analytics
  - name: Leaderboard
    description: Rankings and leaderboards
  - name: Status
    description: API and service health
paths:
  /orgs:
    get:
      tags:
        - Organizations
      summary: List organizations
      description: Returns a paginated list of all indexed HCB organizations. Supports
        sorting and filtering by category.
      operationId: listOrgs
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
            minimum: 1
          description: Page number
        - name: per_page
          in: query
          schema:
            type: integer
            default: 50
            minimum: 1
            maximum: 100
          description: Results per page
        - name: sort
          in: query
          schema:
            type: string
            enum:
              - balance
              - name
              - added
            default: balance
          description: Sort field
        - name: order
          in: query
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
          description: Sort order
        - name: category
          in: query
          schema:
            type: string
          description: Filter by category
      responses:
        "200":
          description: List of organizations
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/Organization"
                      meta:
                        $ref: "#/components/schemas/PaginationMeta"
  /orgs/{id}:
    get:
      tags:
        - Organizations
      summary: Get organization
      description: Returns details for a single organization by its ID.
      operationId: getOrg
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Organization ID
      responses:
        "200":
          description: Organization details
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/Organization"
        "404":
          $ref: "#/components/responses/NotFound"
  /orgs/{id}/activities:
    get:
      tags:
        - Organizations
      summary: Get organization activities
      description: Returns a paginated activity feed for a specific organization.
      operationId: getOrgActivities
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Organization ID
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: per_page
          in: query
          schema:
            type: integer
            default: 50
            maximum: 100
      responses:
        "200":
          description: Activity feed
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/Activity"
                      meta:
                        $ref: "#/components/schemas/PaginationMeta"
  /orgs/{id}/users:
    get:
      tags:
        - Organizations
      summary: Get organization users
      description: Returns all users associated with a specific organization.
      operationId: getOrgUsers
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Organization ID
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/UserSummary"
  /users/{id}:
    get:
      tags:
        - Users
      summary: Get user profile
      description: Returns a user's profile including their organizations with
        balances, net worth, and activity count.
      operationId: getUser
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: User ID
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/UserProfile"
        "404":
          $ref: "#/components/responses/NotFound"
  /users/{id}/activities:
    get:
      tags:
        - Users
      summary: Get user activities
      description: Returns a paginated activity feed for a specific user.
      operationId: getUserActivities
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: User ID
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: per_page
          in: query
          schema:
            type: integer
            default: 50
            maximum: 100
      responses:
        "200":
          description: Activity feed
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/Activity"
                      meta:
                        $ref: "#/components/schemas/PaginationMeta"
  /activities:
    get:
      tags:
        - Activities
      summary: List activities
      description: Returns a paginated global activity feed. Supports filtering by
        organization, user, activity type, and date range.
      operationId: listActivities
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: per_page
          in: query
          schema:
            type: integer
            default: 50
            maximum: 100
        - name: org_id
          in: query
          schema:
            type: string
          description: Filter by organization ID
        - name: user_id
          in: query
          schema:
            type: string
          description: Filter by user ID
        - name: key
          in: query
          schema:
            type: string
          description: Filter by activity type key
        - name: after
          in: query
          schema:
            type: string
            format: date-time
          description: Only activities after this timestamp
        - name: before
          in: query
          schema:
            type: string
            format: date-time
          description: Only activities before this timestamp
      responses:
        "200":
          description: Activity feed
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/Activity"
                      meta:
                        $ref: "#/components/schemas/PaginationMeta"
  /search:
    get:
      tags:
        - Search
      summary: Search
      description: Full-text search across organizations, users, and activities.
      operationId: search
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
          description: Search query
        - name: scope
          in: query
          schema:
            type: string
            enum:
              - all
              - orgs
              - users
              - activities
            default: all
          description: Limit search to a specific entity type
        - name: limit
          in: query
          schema:
            type: integer
            default: 15
            maximum: 50
          description: Max results per entity type
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          orgs:
                            type: array
                            items:
                              $ref: "#/components/schemas/OrganizationSummary"
                          users:
                            type: array
                            items:
                              $ref: "#/components/schemas/UserSummary"
                          activities:
                            type: array
                            items:
                              $ref: "#/components/schemas/ActivitySummary"
        "400":
          $ref: "#/components/responses/BadRequest"
  /stats:
    get:
      tags:
        - Stats
      summary: Get overview stats
      description: "Returns high-level aggregate statistics: total organizations,
        total balance, and 7-day activity volume."
      operationId: getStats
      responses:
        "200":
          description: Overview statistics
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          total_organizations:
                            type: integer
                            example: 2500
                          total_balance_cents:
                            type: integer
                            example: 1500000000
                          activity_volume_7d:
                            type: integer
                            example: 3200
                          activity_volume_previous_7d:
                            type: integer
                            example: 2800
  /stats/detailed:
    get:
      tags:
        - Stats
      summary: Get detailed stats
      description: Returns detailed statistics including top orgs by balance, most
        active orgs and users, and a 30-day activity volume chart.
      operationId: getDetailedStats
      responses:
        "200":
          description: Detailed statistics
  /leaderboard:
    get:
      tags:
        - Leaderboard
      summary: Get leaderboard
      description: Returns ranked leaderboards. Supports balance rankings for orgs,
        and activity rankings for orgs and users over configurable time periods.
      operationId: getLeaderboard
      parameters:
        - name: type
          in: query
          required: true
          schema:
            type: string
            enum:
              - balance
              - active_orgs
              - active_users
          description: Leaderboard type
        - name: period
          in: query
          schema:
            type: string
            enum:
              - 7d
              - 30d
            default: 7d
          description: Time period for activity leaderboards
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
            minimum: 1
            maximum: 50
          description: Number of results
      responses:
        "200":
          description: Leaderboard rankings
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          type: object
                          properties:
                            rank:
                              type: integer
                            id:
                              type: string
                            name:
                              type: string
        "400":
          $ref: "#/components/responses/BadRequest"
  /status:
    get:
      tags:
        - Status
      summary: API status
      description: Returns the current API version and service health status.
      operationId: getStatus
      responses:
        "200":
          description: API status
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          api_version:
                            type: string
                            example: v1
                          status:
                            type: string
                            example: operational
                          services:
                            type: object
                            additionalProperties:
                              type: boolean
components:
  schemas:
    SuccessEnvelope:
      type: object
      required:
        - ok
        - data
      properties:
        ok:
          type: boolean
          const: true
    ErrorEnvelope:
      type: object
      required:
        - ok
        - error
      properties:
        ok:
          type: boolean
          const: false
        error:
          type: object
          required:
            - code
            - message
          properties:
            code:
              type: string
            message:
              type: string
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
          example: 1
        per_page:
          type: integer
          example: 50
        total:
          type: integer
          example: 1234
        has_more:
          type: boolean
          example: true
    Organization:
      type: object
      properties:
        id:
          type: string
          example: org_abc123
        name:
          type: string
          example: Hack Club HQ
        slug:
          type: string
          example: hack-club-hq
        category:
          type: string
          nullable: true
          example: hackathon
        balance_cents:
          type: integer
          example: 1500000
        added:
          type: string
          format: date-time
        frozen_at:
          type: string
          format: date-time
          nullable: true
    OrganizationSummary:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        slug:
          type: string
        category:
          type: string
          nullable: true
        balance_cents:
          type: integer
    UserSummary:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        avatar:
          type: string
          nullable: true
    UserProfile:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        avatar:
          type: string
          nullable: true
        organizations:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              name:
                type: string
              logo:
                type: string
                nullable: true
              balance_cents:
                type: integer
                nullable: true
        net_worth_cents:
          type: integer
        activity_count:
          type: integer
    Activity:
      type: object
      properties:
        id:
          type: string
        key:
          type: string
          example: transaction.created
        created_at:
          type: string
          format: date-time
        user:
          type: object
          nullable: true
          properties:
            id:
              type: string
            name:
              type: string
            avatar:
              type: string
              nullable: true
        organization:
          type: object
          nullable: true
          properties:
            id:
              type: string
            name:
              type: string
            logo:
              type: string
              nullable: true
    ActivitySummary:
      type: object
      properties:
        id:
          type: string
        key:
          type: string
        created_at:
          type: string
          format: date-time
        user:
          type: object
          nullable: true
          properties:
            id:
              type: string
            name:
              type: string
        organization:
          type: object
          nullable: true
          properties:
            id:
              type: string
            name:
              type: string
  responses:
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
          example:
            ok: false
            error:
              code: NOT_FOUND
              message: Resource not found
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
          example:
            ok: false
            error:
              code: BAD_REQUEST
              message: Invalid request parameters
    RateLimited:
      description: Rate limit exceeded
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
          example:
            ok: false
            error:
              code: RATE_LIMITED
              message: Rate limit exceeded. Try again later.
