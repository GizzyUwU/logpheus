services:
  logpheus:
    build:
      context: .
    env_file: .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: always
    ports:
      - 53814:3000
    volumes:
      - cache:/usr/src/app/cache
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS http://localhost:3000/healthcheck | jq -e '.okay == true' >/dev/null",
        ]
      interval: 10s
      timeout: 2s
      retries: 5
      start_period: 4s

volumes:
  cache:
